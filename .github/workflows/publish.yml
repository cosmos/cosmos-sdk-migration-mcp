name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify release version metadata
        run: python scripts/check_version.py --tag "${GITHUB_REF_NAME}"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Smoke test built wheel
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          from cosmos_migration_mcp.specs import SPEC_DIR

          assert SPEC_DIR.exists(), SPEC_DIR
          print("wheel import OK")
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
