name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify package version metadata
        run: python scripts/check_version.py

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Install built wheel
        run: python -m pip install dist/*.whl

      - name: Smoke test packaged assets
        run: |
          python - <<'PY'
          from cosmos_migration_mcp.specs import SPEC_DIR, UPGRADING_FILE
          from cosmos_migration_mcp.server import _load_spec

          assert SPEC_DIR.exists(), SPEC_DIR
          assert UPGRADING_FILE.exists(), UPGRADING_FILE
          assert _load_spec("core-sdk-migration") is not None
          print("packaged assets OK")
          PY
